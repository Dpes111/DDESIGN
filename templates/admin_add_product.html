{% extends "admin_base.html" %}
{% block title %}Add Product - Admin{% endblock %}
{% block page_title %}Add New Product{% endblock %}

{% block content %}

<div style="max-width:680px;">
  <div class="admin-table-wrap" style="padding:0;overflow:visible;">
    <div class="admin-table-header">
      <h3>Product Information</h3>
      <a href="{{ url_for('admin_products') }}" class="btn btn-secondary btn-sm">← Back</a>
    </div>
    <div style="padding:28px 32px;">
      <form action="{{ url_for('admin_add_product') }}" method="POST" enctype="multipart/form-data">

        <div class="form-group">
          <label class="form-label">Product Name <span class="required">*</span></label>
          <input type="text" name="name" class="form-control" placeholder="e.g. Custom Name Sign" required>
        </div>

        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="3"
            placeholder="Describe the product…"></textarea>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Price (Rs.) <span class="required">*</span></label>
            <input type="number" name="price" class="form-control" placeholder="0.00"
                   step="0.01" min="0" required>
          </div>
          <div class="form-group">
            <label class="form-label">Stock Quantity</label>
            <input type="number" name="stock" class="form-control" placeholder="10" value="10" min="0">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Category</label>
          <select name="category" class="form-control">
            <option value="">Select category…</option>
            {% for cat in categories %}
            <option value="{{ cat }}">{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Product Image</label>
          <div class="file-upload">
            <input type="file" name="image" accept="image/*">
            <div class="file-upload-icon">🖼️</div>
            <div class="file-upload-text">Click or drag to upload product image</div>
            <div class="file-upload-hint">PNG, JPG, JPEG or GIF</div>
          </div>
        </div>

        <div style="display:flex;gap:12px;">
          <button type="submit" class="btn btn-primary btn-lg">➕ Add Product</button>
          <a href="{{ url_for('admin_products') }}" class="btn btn-secondary btn-lg">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
